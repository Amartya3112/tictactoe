<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-x: #6366f1;
            --accent-x-glow: rgba(99, 102, 241, 0.4);
            --accent-o: #ec4899;
            --accent-o-glow: rgba(236, 72, 153, 0.4);
            --cell-bg: rgba(255, 255, 255, 0.03);
            --cell-hover: rgba(255, 255, 255, 0.08);
            --cell-border: rgba(255, 255, 255, 0.1);
            --btn-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --btn-hover: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.3);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-primary: #1e293b;
            --text-secondary: rgba(30, 41, 59, 0.6);
            --accent-x: #4f46e5;
            --accent-x-glow: rgba(79, 70, 229, 0.2);
            --accent-o: #db2777;
            --accent-o-glow: rgba(219, 39, 119, 0.2);
            --cell-bg: rgba(0, 0, 0, 0.03);
            --cell-hover: rgba(0, 0, 0, 0.06);
            --cell-border: rgba(0, 0, 0, 0.1);
            --btn-primary: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --btn-hover: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --shadow-glow: 0 0 40px rgba(79, 70, 229, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, var(--accent-x-glow) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, var(--accent-o-glow) 0%, transparent 50%);
            opacity: 0.5;
            animation: gradientMove 15s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes gradientMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-2%, -2%) rotate(-1deg); }
        }

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--cell-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3), var(--shadow-glow);
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
            transition: all 0.4s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--text-primary);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-x) 0%, var(--accent-o) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-toggle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid var(--cell-border);
            background: var(--cell-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            background: var(--cell-hover);
            transform: scale(1.1);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
        }

        .status {
            font-size: 1.25rem;
            margin-bottom: 30px;
            color: var(--text-secondary);
            min-height: 32px;
            font-weight: 500;
            padding: 12px 24px;
            background: var(--cell-bg);
            border-radius: 16px;
            display: inline-block;
            border: 1px solid var(--cell-border);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 0 auto 30px;
            padding: 12px;
            background: var(--cell-bg);
            border-radius: 20px;
            border: 1px solid var(--cell-border);
        }

        .cell {
            aspect-ratio: 1;
            background: var(--cell-bg);
            border: 1px solid var(--cell-border);
            border-radius: 16px;
            font-size: 2.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .cell:hover:not(:disabled)::before {
            opacity: 1;
        }

        .cell:hover:not(:disabled) {
            background: var(--cell-hover);
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .cell.x {
            color: var(--accent-x);
            text-shadow: 0 0 20px var(--accent-x-glow);
        }

        .cell.o {
            color: var(--accent-o);
            text-shadow: 0 0 20px var(--accent-o-glow);
        }

        .cell:disabled {
            cursor: not-allowed;
        }

        .cell.winner {
            background: linear-gradient(135deg, var(--accent-x) 0%, var(--accent-o) 100%);
            color: white;
            text-shadow: none;
            animation: winnerPulse 0.6s ease-in-out infinite alternate;
            border-color: transparent;
        }

        @keyframes winnerPulse {
            from {
                transform: scale(1);
                box-shadow: 0 0 20px var(--accent-x-glow);
            }
            to {
                transform: scale(1.05);
                box-shadow: 0 0 40px var(--accent-o-glow);
            }
        }

        .cell span {
            animation: popIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .reset-btn {
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: 600;
            background: var(--btn-primary);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .reset-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .reset-btn:hover::before {
            opacity: 1;
        }

        .reset-btn:hover {
            background: var(--btn-hover);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
        }

        .reset-btn:active {
            transform: translateY(-1px);
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .score {
            padding: 16px 28px;
            background: var(--cell-bg);
            border: 1px solid var(--cell-border);
            border-radius: 16px;
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .score:hover {
            background: var(--cell-hover);
            transform: translateY(-2px);
        }

        .score span {
            font-weight: 700;
            font-size: 1.5rem;
            margin-left: 8px;
        }

        .score.x-score span {
            color: var(--accent-x);
        }

        .score.o-score span {
            color: var(--accent-o);
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
                border-radius: 24px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .board {
                gap: 8px;
                padding: 8px;
            }

            .cell {
                font-size: 2rem;
                border-radius: 12px;
            }

            .scoreboard {
                gap: 12px;
            }

            .score {
                padding: 12px 20px;
                font-size: 0.85rem;
            }

            .score span {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tic Tac Toe</h1>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>
        <div class="status" id="status">Player X's turn</div>
        <div class="board" id="board">
            <button class="cell" data-index="0" aria-label="Cell 1"></button>
            <button class="cell" data-index="1" aria-label="Cell 2"></button>
            <button class="cell" data-index="2" aria-label="Cell 3"></button>
            <button class="cell" data-index="3" aria-label="Cell 4"></button>
            <button class="cell" data-index="4" aria-label="Cell 5"></button>
            <button class="cell" data-index="5" aria-label="Cell 6"></button>
            <button class="cell" data-index="6" aria-label="Cell 7"></button>
            <button class="cell" data-index="7" aria-label="Cell 8"></button>
            <button class="cell" data-index="8" aria-label="Cell 9"></button>
        </div>
        <button class="reset-btn" id="resetBtn">New Game</button>
        <div class="scoreboard">
            <div class="score x-score">X<span id="xScore">0</span></div>
            <div class="score o-score">O<span id="oScore">0</span></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("http://localhost:3000");  // 👈 YEH TOP PE

const board = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const status = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const themeToggle = document.getElementById('themeToggle');
        const xScoreEl = document.getElementById('xScore');
        const oScoreEl = document.getElementById('oScore');

        let currentPlayer = 'X';
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let scores = { X: 0, O: 0 };
        let isDarkMode = true;

        const winPatterns = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>`;

        const moonIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>`;

        function handleCellClick(e) {
            const cell = e.target;
            const index = parseInt(cell.dataset.index);
            sendMove(index);
        

            if (gameBoard[index] !== '' || !gameActive) return;

            gameBoard[index] = currentPlayer;
            cell.innerHTML = `<span>${currentPlayer}</span>`;
            cell.classList.add(currentPlayer.toLowerCase());

            if (checkWin()) {
                status.textContent = `Player ${currentPlayer} wins!`;
                gameActive = false;
                scores[currentPlayer]++;
                updateScores();
                highlightWinner();
                return;
            }

            if (checkDraw()) {
                status.textContent = "It's a draw!";
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            status.textContent = `Player ${currentPlayer}'s turn`;
        }

        function checkWin() {
            return winPatterns.some(pattern => {
                return pattern.every(index => gameBoard[index] === currentPlayer);
            });
        }

        function checkDraw() {
            return gameBoard.every(cell => cell !== '');
        }

        function highlightWinner() {
            winPatterns.forEach(pattern => {
                if (pattern.every(index => gameBoard[index] === currentPlayer)) {
                    pattern.forEach(index => {
                        cells[index].classList.add('winner');
                    });
                }
            });
        }

        function updateScores() {
            xScoreEl.textContent = scores.X;
            oScoreEl.textContent = scores.O;
        }

        function resetGame() {
            gameBoard = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';
            status.textContent = "Player X's turn";

            cells.forEach(cell => {
                cell.innerHTML = '';
                cell.classList.remove('x', 'o', 'winner');
                cell.disabled = false;
            });
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
            themeToggle.innerHTML = isDarkMode ? sunIcon : moonIcon;
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                isDarkMode = savedTheme === 'dark';
            } else {
                isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
            themeToggle.innerHTML = isDarkMode ? sunIcon : moonIcon;
        }

        cells.forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        resetBtn.addEventListener('click', resetGame);
        themeToggle.addEventListener('click', toggleTheme);

        loadTheme();
        function sendMove(index) {
  socket.emit("move", {
    room: "room1",
    index: index,
    player: currentPlayer
  });
}

socket.on("move", (data) => {
  gameBoard[data.index] = data.player;
  cells[data.index].textContent = data.player;
});
    
    </script
</body>
</html>
